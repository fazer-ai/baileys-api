name: Run Tests on PR

on:
  pull_request:
    branches: [main, beta]
  push:
    branches: [main, beta]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-deps-v2-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-deps-v2-

      - name: Install All Dependencies
        run: bun install

      - name: Debug mock.module
        run: |
          bun -e "
            import { mock } from 'bun:test';
            mock.module('@whiskeysockets/baileys', () => ({
              default: () => 'MOCKED',
              __test: true,
            }));
            const mod = await import('@whiskeysockets/baileys');
            console.log('default is mocked:', typeof mod.default === 'function' && mod.default() === 'MOCKED');
            console.log('__test exists:', (mod as any).__test);
            console.log('keys:', Object.keys(mod).slice(0, 10));
          "

      - name: Run Tests
        run: bun run test
