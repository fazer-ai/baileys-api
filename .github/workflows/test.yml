name: Run Tests on PR

on:
  pull_request:
    branches: [main, beta]
  push:
    branches: [main, beta]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-deps-v2-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-deps-v2-

      - name: Install All Dependencies
        run: bun install

      - name: Debug - connection + connectionsHandler only
        run: bun test src/baileys/connection.spec.ts src/baileys/connectionsHandler.spec.ts 2>&1 | tail -5

      - name: Debug - find interfering file
        run: |
          for f in src/controllers/status.spec.ts src/baileys/redisAuthState.spec.ts src/baileys/connectionsHandler.spec.ts; do
            echo "=== Testing connection.spec.ts with $f ==="
            bun test src/baileys/connection.spec.ts "$f" 2>&1 | grep -E "pass|fail" | tail -3
          done

      - name: Run Tests
        run: bun run test
