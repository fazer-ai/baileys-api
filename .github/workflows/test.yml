name: Run Tests on PR

on:
  pull_request:
    branches: [main, beta]
  push:
    branches: [main, beta]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-deps-v2-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-deps-v2-

      - name: Install All Dependencies
        run: bun install

      - name: Run Tests
        run: |
          # connection.spec.ts must run in a separate process because
          # connectionsHandler.spec.ts mocks @/baileys/connection and
          # bun leaks mock.module across files (oven-sh/bun#12823).
          bun test src/baileys/connection.spec.ts
          bun test --coverage --path-ignore-patterns 'src/baileys/connection.spec.ts'
